services:
  # ─────────────────────────────────────────────
  # SwiftTalon Agent (one-shot query)
  #   docker compose run --rm swifttalon-agent -m "Hello"
  # ─────────────────────────────────────────────
  swifttalon-agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: swifttalon-agent
    profiles:
      - agent
    volumes:
      - ./config/config.json:/root/.swifttalon/config.json:ro
      - swifttalon-workspace:/root/.swifttalon/workspace
    entrypoint: ["swifttalon", "agent"]
    stdin_open: true
    tty: true

  # ─────────────────────────────────────────────
  # SwiftTalon Gateway (Long-running Bot)
  #   docker compose up swifttalon-gateway
  # ─────────────────────────────────────────────
  swifttalon-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: swifttalon-gateway
    restart: unless-stopped
    profiles:
      - gateway
    volumes:
      # Configuration file
      - ./config/config.json:/root/.swifttalon/config.json:ro
      # Persistent workspace (sessions, memory, logs)
      - swifttalon-workspace:/root/.swifttalon/workspace
    command: ["gateway"]

volumes:
  swifttalon-workspace:
